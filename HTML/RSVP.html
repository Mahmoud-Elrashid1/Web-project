<main>

<section class="rsvp-page">

<h2>Event RSVP</h2>

<p>Register to attend this event.</p>

<form class="rsvp-form">

<label for="name">Full Name</label>
<input type="text" id="name" name="name" placeholder="Enter your name">

<label for="email">Email</label>
<input type="email" id="email" name="email" placeholder="Enter your email">

<label for="event">Event</label>
<select id="event" name="event">

<option>AI & Machine Learning Seminar</option>
<option>Photography Workshop</option>
<option>Startup Networking Night</option>

</select>

<label for="guests">Number of Guests</label>
<input type="number" id="guests" name="guests" min="0" max="5">

<button type="submit">Confirm RSVP</button>

</form>

</section>

</main>

<footer>
<p>© 2026 Campus Event Hub</p>
</footer>
<script src="../Js/RSVP.js"></script>
</body>
