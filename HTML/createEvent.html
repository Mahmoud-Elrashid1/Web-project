    </header>
    <main>
    <h2>Create New Event</h2>
<p>Submit your campus event for admin review. Once approved, it will appear on the events page.</p>
<form id="eventForm">

<label for="title">Event Title</label>
<input type="text" id="title" name="title" placeholder="Enter event title" required>
<small class="error"></small>

<label for="organizer">Organizer</label>
<input type="text" id="organizer" name="organizer" placeholder="e.g. CS Department" required>
<small class="error"></small>

<label for="category">Category</label>
<select id="category" name="category">
<option value="seminar">Seminar</option>
<option value="workshop">Workshop</option>
<option value="meetup">Meetup</option>
</select>

<label for="image">Event Image</label>
<input type="file" id="image" name="image" accept="image/*">
<small class="error"></small>

<label for="date">Event Date</label>
<input type="date" id="date" name="date" placeholder="01/03/2005" required>
<small class="error"></small>

<label for="location">Location</label>
<input type="text" id="location" name="location" placeholder="e.g. Science Hall" required>
<small class="error"></small>

<label for="description">Description</label>
<textarea id="description" name="description"></textarea>
<small class="error"></small>

<button type="submit">Submit Event For Review</button>

</form>
</main>
<footer>
        <p>© 2026 Campus Event Hub</p>
</footer>

<script src="../Js/createevent.js"></script>
</body>
</html>
